name: Update Formula
run-name: Update ${{ inputs.formula }} for ${{ inputs.tag }}${{ inputs.request_id && format(' ({0})', inputs.request_id) || '' }}

on:
  workflow_dispatch:
    inputs:
      formula:
        description: "Formula name (e.g., gitcrawl)"
        required: true
        type: string
        default: "gitcrawl"
      tag:
        description: "Release tag to update formula for"
        required: true
        type: string
      repository:
        description: "Source repository (e.g., openclaw/gitcrawl)"
        required: true
        type: string
        default: "openclaw/gitcrawl"
      artifact_template:
        description: "Release asset template, e.g. {formula}_{version}_{target}.tar.gz"
        required: false
        type: string
      request_id:
        description: "Unique caller-generated ID used to identify this workflow run"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: macos-latest
    steps:
      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update formula
        run: |
          FORMULA="${{ github.event.inputs.formula }}"
          TAG="${{ github.event.inputs.tag }}"
          REPO="${{ github.event.inputs.repository }}"
          VERSION="${TAG#v}"
          ASSET_TEMPLATE="${{ github.event.inputs.artifact_template }}"
          if [ -z "${ASSET_TEMPLATE}" ]; then
            ASSET_TEMPLATE="{formula}_{version}_{target}.tar.gz"
          fi
          export FORMULA TAG REPO VERSION ASSET_TEMPLATE

          for TARGET in darwin_amd64 darwin_arm64 linux_amd64 linux_arm64; do
            ASSET="${ASSET_TEMPLATE}"
            ASSET="${ASSET//\{formula\}/${FORMULA}}"
            ASSET="${ASSET//\{version\}/${VERSION}}"
            ASSET="${ASSET//\{tag\}/${TAG}}"
            ASSET="${ASSET//\{target\}/${TARGET}}"
            URL="https://github.com/${REPO}/releases/download/${TAG}/${ASSET}"
            curl -fsSL "${URL}" -o "${ASSET}"
            SHA="$(shasum -a 256 "${ASSET}" | awk '{print $1}')"
            export "URL_${TARGET}=${URL}"
            export "SHA_${TARGET}=${SHA}"
          done

          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          formula = os.environ["FORMULA"]
          version = os.environ["VERSION"]
          path = Path("Formula") / f"{formula}.rb"
          text = path.read_text()
          text = re.sub(r'version "[^"]+"', f'version "{version}"', text, count=1)

          for target in ("darwin_amd64", "darwin_arm64", "linux_amd64", "linux_arm64"):
              url = os.environ[f"URL_{target}"]
              sha = os.environ[f"SHA_{target}"]
              pattern = rf'url "https://github\.com/[^"]+/{formula}_[^"]+_{target}\.tar\.gz"\n\s+sha256 "[0-9a-f]+"'
              replacement = f'url "{url}"\n      sha256 "{sha}"'
              text, count = re.subn(pattern, replacement, text, count=1)
              if count != 1:
                  raise SystemExit(f"failed to update {target} in {path}")

          path.write_text(text)
          PY

          git add "Formula/${FORMULA}.rb"
          if git diff --cached --quiet; then
            echo "Formula/${FORMULA}.rb already up to date"
            exit 0
          fi
          git commit -m "chore: update ${FORMULA} to ${TAG}"
          git push
